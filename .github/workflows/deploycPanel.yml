name: Deploy ke cPanel

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * *'   # otomatis update setiap hari jam 15:00 WIB / 08:00 UTC

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (if any)
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Run static generator
        run: node tools/generate.js

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy via FTP without remote delete
        env:
          FTP_HOST: 195.88.211.226
          FTP_USER: deploy1@bandungbersuara.jabarinfo.id
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:passive-mode on
            set ftp:ssl-allow no
            open -u $FTP_USER,$FTP_PASS ftp://$FTP_HOST
            mirror -R --parallel=3 --only-newer --verbose \
              --exclude-glob .git* \
              --exclude-glob .github \
              --exclude-glob node_modules \
              --exclude-glob '*.bak*' \
              --exclude-glob articles_temp.json \
              --exclude-glob .DS_Store \
              --exclude-glob .env \
              --exclude-glob .env.local \
              --exclude-glob '*.log' \
              --exclude-glob TROUBLESHOOTING.md \
              --exclude-glob AUDIT_REPORT.md \
              --exclude-glob PERBAIKAN_STATUS.md \
              --exclude-glob final-verification.ps1 \
              --exclude-glob fix-encoding.ps1 \
              --exclude-glob rebrand-to-warta-janten.ps1 \
              --exclude-glob replace-logo.ps1 \
              ./ /seputarpurwasuka
          "
