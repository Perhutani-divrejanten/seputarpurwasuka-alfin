name: Deploy ke cPanel

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * *'   # otomatis update setiap hari jam 15:00 WIB / 08:00 UTC

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (if any)
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Run static generator
        run: node tools/generate.js

      - name: Deploy via FTP (only changed files)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 195.88.211.226
          username: deploy1@bandungbersuara.jabarinfo.id
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: /seputarpurwasuka/
          state-name: .ftp-deploy-sync-state.json
          timeout: 600000
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            *.bak*
            articles_temp.json
            .DS_Store
            .env
            .env.local
            *.log
            *.ps1
            *.md
            tools/**
            lib/**
            scripts/**
            rebrand_*.ipynb
            **/Thumbs.db
