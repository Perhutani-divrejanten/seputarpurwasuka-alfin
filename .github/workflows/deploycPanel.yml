name: Deploy ke cPanel

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * *'   # otomatis update setiap hari jam 15:00 WIB / 08:00 UTC

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (if any)
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Run static generator
        run: node tools/generate.js

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy via FTP without remote delete
        env:
          FTP_HOST: 195.88.211.226
          FTP_USER: deploy1@bandungbersuara.jabarinfo.id
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:passive-mode on
            set ftp:ssl-allow no
            open -u $FTP_USER,$FTP_PASS ftp://$FTP_HOST
            mirror -R --parallel=3 --only-newer --verbose css /seputarpurwasuka/css
            mirror -R --parallel=3 --only-newer --verbose js /seputarpurwasuka/js
            mirror -R --parallel=3 --only-newer --verbose img /seputarpurwasuka/img
            mirror -R --parallel=3 --only-newer --verbose article /seputarpurwasuka/article
            put -O /seputarpurwasuka index.html news.html contact.html login.html register.html search.html clearstorage.html debug-images.html articles.json
          "
